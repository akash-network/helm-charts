apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}-{{ .Values.chain }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Chart.Name }}-{{ .Values.chain }}
  annotations:
    secrets.doppler.com/reload: 'true'
spec:
  replicas: {{ .Values.replicas | default 1 }}
  selector:
    matchLabels:
      app: {{ .Chart.Name }}-{{ .Values.chain }}
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}-{{ .Values.chain }}
    spec:
      containers:
        - name: {{ .Chart.Name }}-{{ .Values.chain }}
          image: ghcr.io/akash-network/console-provider-inventory:{{ .Values.appVersion }}
          imagePullPolicy: "Always"
          ports:
            - containerPort: 3000
              name: api-port
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ .Chart.Name }}-{{ .Values.chain }}-secret
            - configMapRef:
                name: {{ .Chart.Name }}-{{ .Values.chain }}-config
          env:
            - name: OTEL_SERVICE_NAME
              value: {{ .Chart.Name }}-{{ .Values.chain }}
            - name: INTERFACE
              value: "rest"
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /private/v1/healthz/readiness
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /private/v1/healthz/liveness
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
