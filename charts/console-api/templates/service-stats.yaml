apiVersion: v1
kind: Service
metadata:
  name: {{ .Chart.Name }}-stats-{{ .Values.chain }}-service
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: {{ .Chart.Name }}-stats-{{ .Values.chain }}
  ports:
    - protocol: TCP
      port: 3000
      targetPort: api-port
      name: api-port
  type: ClusterIP
